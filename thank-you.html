<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiry Received — NH &amp; E Group Inc</title>
  <meta name="description" content="Thank you for your inquiry. NH &amp; E Group Inc will be in touch shortly.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #080808;
      color: #F0EBE1;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .font-serif { font-family: 'Cormorant Garamond', Georgia, serif; }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #C9A84C;
    }

    .gold-rule {
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C 40%, #C9A84C 60%, transparent);
      margin: 0 auto;
    }

    .gold-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.5) 30%, rgba(201,168,76,0.7) 50%, rgba(201,168,76,0.5) 70%, transparent 100%);
    }

    /* ── Navigation ── */
    .nav-link {
      position: relative;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7A7060;
      text-decoration: none;
      padding-bottom: 2px;
      transition: color 0.25s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      right: 50%;
      height: 1px;
      background: #C9A84C;
      transition: left 0.3s ease, right 0.3s ease;
    }
    .nav-link:hover { color: #C9A84C; }
    .nav-link:hover::after { left: 0; right: 0; }

    /* ── Buttons ── */
    .btn-gold {
      display: inline-block;
      background: #C9A84C;
      color: #080808;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 13px 32px;
      border: 1px solid #C9A84C;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-gold:hover {
      transform: scale(1.025);
      opacity: 0.92;
      box-shadow: 0 8px 32px rgba(201,168,76,0.25);
    }
    .btn-ghost {
      display: inline-block;
      background: transparent;
      color: #C9A84C;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 13px 32px;
      border: 1px solid rgba(201,168,76,0.45);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, background 0.2s ease;
    }
    .btn-ghost:hover {
      transform: scale(1.025);
      border-color: #C9A84C;
      background: rgba(201,168,76,0.06);
    }

    /* ── Page entrance animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .h-label   { animation: fadeUp 0.7s ease 0.1s  both; }
    .h-rule    { animation: fadeUp 0.5s ease 0.22s both; }
    .h-heading { animation: fadeUp 0.95s ease 0.28s both; }
    .h-sub     { animation: fadeUp 0.75s ease 0.45s both; }
    .h-divider { animation: fadeUp 0.5s  ease 0.58s both; }
    .h-btns    { animation: fadeUp 0.7s  ease 0.68s both; }
    .h-footer  { animation: fadeUp 0.6s  ease 0.78s both; }

    /* ── Checkmark ── */
    @keyframes checkDraw {
      from { stroke-dashoffset: 60; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }
    .check-circle { animation: fadeUp 0.6s ease 0.05s both; }
    .check-mark   {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: checkDraw 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.55s both;
    }
  </style>
</head>
<body>

<!-- ════ NAVIGATION ════ -->
<nav style="position:fixed;top:0;left:0;right:0;z-index:200;background:#000000;border-bottom:1px solid rgba(201,168,76,0.15);">
  <div style="max-width:1280px;margin:0 auto;padding:0 36px;height:90px;display:flex;align-items:center;justify-content:space-between;">
    <a href="/" style="flex-shrink:0;line-height:0;">
      <img src="nhe-logo-new.png" alt="NH &amp; E Group Inc" style="height:74px;width:auto;object-fit:contain;">
    </a>
    <a href="/" class="nav-link">← Return to Site</a>
  </div>
</nav>


<!-- ════ MAIN CONTENT ════ -->
<main style="flex:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding-top:90px;position:relative;overflow:hidden;">

  <!-- Radial gold accent — top right -->
  <div aria-hidden="true" style="position:absolute;top:-10%;right:-5%;width:55%;height:65%;background:radial-gradient(ellipse at center, rgba(201,168,76,0.07) 0%, transparent 62%);pointer-events:none;z-index:0;"></div>
  <!-- Radial gold accent — bottom left -->
  <div aria-hidden="true" style="position:absolute;bottom:-15%;left:-8%;width:45%;height:55%;background:radial-gradient(ellipse at center, rgba(201,168,76,0.05) 0%, transparent 60%);pointer-events:none;z-index:0;"></div>

  <!-- SVG grain overlay -->
  <div aria-hidden="true" style="position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.18;">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#grain)" opacity="1"/>
    </svg>
  </div>

  <!-- Content card -->
  <div style="position:relative;z-index:1;text-align:center;padding:80px 40px;max-width:620px;width:100%;">

    <!-- Animated checkmark -->
    <div class="check-circle" style="margin:0 auto 36px;width:64px;height:64px;">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
        <circle cx="32" cy="32" r="30" stroke="rgba(201,168,76,0.25)" stroke-width="1"/>
        <circle cx="32" cy="32" r="30" stroke="#C9A84C" stroke-width="1" stroke-dasharray="188" stroke-dashoffset="188"
          style="animation: checkDraw 0.8s cubic-bezier(0.25,0.46,0.45,0.94) 0.15s both; stroke-dasharray:188; stroke-dashoffset:188;"/>
        <polyline class="check-mark" points="20,33 28,41 44,24" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Label -->
    <p class="label h-label" style="margin-bottom:20px;">Inquiry Received</p>

    <!-- Gold rule -->
    <div class="gold-rule h-rule" style="margin-bottom:28px;"></div>

    <!-- Headline -->
    <h1 class="font-serif h-heading" style="font-size:clamp(36px,5vw,60px);font-weight:600;letter-spacing:-0.025em;color:#F0EBE1;line-height:1.12;margin-bottom:28px;">
      Thank you for<br>your inquiry.
    </h1>

    <!-- Subtext -->
    <p class="h-sub" style="font-size:0.92rem;line-height:1.85;color:#6A6050;max-width:420px;margin:0 auto 40px;font-weight:300;">
      Our team will review your request and contact you shortly via the email address provided.
    </p>

    <!-- Divider -->
    <div class="gold-divider h-divider" style="margin-bottom:40px;"></div>

    <!-- CTA -->
    <div class="h-btns">
      <a href="/" class="btn-gold">Return to Homepage</a>
    </div>

    <!-- Secondary note -->
    <p class="h-footer" style="margin-top:32px;font-size:0.7rem;letter-spacing:0.14em;color:#423830;text-transform:uppercase;">
      Direct contact &nbsp;·&nbsp;
      <a href="mailto:nhnegroup@outlook.com" style="color:#7A6A50;text-decoration:none;transition:color 0.2s ease;" onmouseover="this.style.color='#C9A84C'" onmouseout="this.style.color='#7A6A50'">nhnegroup@outlook.com</a>
    </p>

  </div>
</main>


<!-- ════ FOOTER ════ -->
<footer style="border-top:1px solid rgba(201,168,76,0.12);padding:28px 36px;text-align:center;">
  <p style="font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:#3A3028;">
    &copy; 2025 NH &amp; E Group Inc &nbsp;·&nbsp; All Rights Reserved
  </p>
</footer>

</body>
</html>
